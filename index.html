<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:;" />
    <title>plot3d.xyz</title>
    <script>
      // Apply stored theme synchronously so the splash matches the user's theme
      // before React mounts. Mirrors the readStoredTheme() logic in uiStore.ts.
      try {
        var t = localStorage.getItem('plot3d-theme');
        if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
        else document.documentElement.setAttribute('data-theme', 'light');
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    </script>
    <style>
      /* Splash shown until React mounts and removes #app-splash. Pure CSS so
         it works even when JS is slow to load. */
      #app-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: #1a1a2e; /* matches dark theme --bg-base */
        color: #a1a1aa;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        transition: opacity 200ms ease-out;
      }
      [data-theme="light"] #app-splash {
        background: #f8fafc;
        color: #475569;
      }
      #app-splash.is-hiding {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .spinner {
        width: 28px;
        height: 28px;
        border: 2.5px solid rgba(148, 148, 170, 0.25);
        border-top-color: #38bdf8; /* matches --accent (dark) */
        border-radius: 50%;
        animation: app-splash-spin 0.8s linear infinite;
      }
      [data-theme="light"] #app-splash .spinner {
        border-color: rgba(15, 23, 42, 0.12);
        border-top-color: #0284c7; /* matches --accent (light) */
      }
      @keyframes app-splash-spin {
        to { transform: rotate(360deg); }
      }
      /* Reduced motion: stop the spinner animation */
      @media (prefers-reduced-motion: reduce) {
        #app-splash .spinner { animation: none; border-top-color: transparent; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <div class="spinner" role="status" aria-label="Loading"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
